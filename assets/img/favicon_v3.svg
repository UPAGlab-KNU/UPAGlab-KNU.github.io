<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 화이트 라운드 사각형 -->
  <rect width="512" height="512" rx="96" ry="96" fill="#ffffff"/>
  
  <!-- 위치 핀 모양 (UPAG 블루) -->
  <path d="M 256 80
           C 160 80 100 150 100 240
           C 100 320 180 380 256 460
           C 332 380 412 320 412 240
           C 412 150 352 80 256 80 Z"
        fill="#1f5f8b"/>
  
  <!-- 핀 안 흰색 동그라미 -->
  <circle cx="256" cy="232" r="92" fill="#ffffff"/>
  
  <!-- 가운데 U 글자 (UPAG 오렌지) -->
  <path d="M 210 175
           L 210 248
           Q 210 280 240 280
           Q 250 280 256 280
           Q 262 280 272 280
           Q 302 280 302 248
           L 302 175
           L 282 175
           L 282 245
           Q 282 260 270 260
           L 256 260
           L 242 260
           Q 230 260 230 245
           L 230 175 Z"
        fill="#f08020"/>
  
  <!-- 작은 점 (지도 스타일) -->
  <circle cx="180" cy="200" r="4" fill="#1f5f8b" opacity="0.3"/>
  <circle cx="332" cy="200" r="4" fill="#1f5f8b" opacity="0.3"/>
  <circle cx="200" cy="280" r="4" fill="#1f5f8b" opacity="0.3"/>
  <circle cx="312" cy="280" r="4" fill="#1f5f8b" opacity="0.3"/>
</svg>
